server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static assets with long cache (CRA emits content-hashed filenames)
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API requests proxied to the backend service (docker-compose network).
    # The frontend build uses a relative '/api' base URL when
    # REACT_APP_API_URL is not baked in at build time.
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: every non-file route serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
